<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="관심 단지의 최신 입주민 리뷰를 한곳에서 확인하세요." />
    <title>우리 동네 리뷰 | Realty Feed</title>
    <style>
      :root {
        --ink: #172238;
        --muted: #657086;
        --line: #e6e9ef;
        --paper: #fffdf9;
        --cream: #f6f1e9;
        --blue: #2857d7;
        --blue-soft: #e9efff;
        --mint: #3d9b7a;
        font-family: Pretendard, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      }

      * { box-sizing: border-box; }
      body { margin: 0; color: var(--ink); background: var(--cream); }
      button { font: inherit; }
      .shell { max-width: 1120px; margin: 0 auto; padding: 0 24px 56px; }
      header { display: flex; justify-content: space-between; align-items: center; padding: 28px 0 24px; }
      .brand { display: flex; align-items: center; gap: 10px; font-size: 17px; font-weight: 800; letter-spacing: -0.5px; }
      .logo { display: grid; place-items: center; width: 30px; height: 30px; color: white; background: var(--blue); border-radius: 10px; font-size: 17px; }
      .status { display: flex; gap: 7px; align-items: center; color: var(--muted); font-size: 13px; }
      .status i { width: 8px; height: 8px; border-radius: 50%; background: var(--mint); box-shadow: 0 0 0 4px #dcefe8; }
      main { margin-top: 14px; }
      .toolbar { display: flex; justify-content: space-between; align-items: end; gap: 20px; margin-bottom: 17px; }
      h2 { margin: 0; font-size: 23px; letter-spacing: -1px; }
      .updated { margin: 7px 0 0; color: var(--muted); font-size: 13px; }
      .filters { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; }
      .filter { flex: 0 0 auto; padding: 9px 13px; cursor: pointer; border: 1px solid var(--line); border-radius: 999px; color: var(--muted); background: #fff; font-size: 13px; }
      .filter.active { border-color: var(--blue); color: white; background: var(--blue); }
      .feed { display: grid; gap: 12px; }
      .card { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 20px; padding: 24px; border: 1px solid var(--line); border-radius: 18px; background: var(--paper); box-shadow: 0 8px 20px rgba(30, 45, 80, .04); }
      .tag { display: inline-block; margin-bottom: 10px; padding: 5px 9px; border-radius: 6px; color: var(--blue); background: var(--blue-soft); font-size: 12px; font-weight: 700; }
      h3 { margin: 0; font-size: 17px; letter-spacing: -0.65px; }
      .review { margin: 11px 0 0; color: #3d485d; font-size: 15px; line-height: 1.65; white-space: pre-line; }
      .meta { margin: 13px 0 0; color: var(--muted); font-size: 12px; }
      .time { color: var(--muted); font-size: 12px; white-space: nowrap; }
      .empty { display: none; padding: 42px 20px; border: 1px dashed #cfd6e3; border-radius: 18px; color: var(--muted); text-align: center; background: rgba(255,255,255,.45); }
      .notice { padding: 42px 20px; border: 1px dashed #cfd6e3; border-radius: 18px; color: var(--muted); text-align: center; background: rgba(255,255,255,.45); }
      footer { margin-top: 34px; color: var(--muted); font-size: 12px; text-align: center; }
      @media (max-width: 640px) {
        .shell { padding: 0 16px 36px; }
        header { padding: 20px 0; }
        .toolbar { display: block; }
        .filters { margin-top: 18px; }
        .card { grid-template-columns: 1fr; gap: 8px; padding: 20px; }
        .time { grid-row: 1; grid-column: 1; justify-self: start; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <div class="brand"><span class="logo">⌂</span> 우리 동네 리뷰</div>
        <div class="status" id="status"><i></i> 불러오는 중</div>
      </header>

      <main>
        <div class="toolbar">
          <div>
            <h2>최신 글</h2>
            <p class="updated">2026년 7월 22일 오전 8:31 기준</p>
          </div>
          <div class="filters" id="filters" aria-label="단지 필터"></div>
        </div>
        <section class="feed" id="feed" aria-live="polite"></section>
        <div class="empty" id="empty">선택한 단지에 아직 표시할 새 리뷰가 없습니다.</div>
        <div class="notice" id="notice">최신 리뷰를 불러오는 중입니다.</div>
      </main>

      <footer>Realty Feed · 입주민 리뷰를 참고용으로 제공합니다.</footer>
    </div>

    <script>
      const FEED_URL = "./feed.json";
      const filterRoot = document.querySelector("#filters");
      const feed = document.querySelector("#feed");
      const empty = document.querySelector("#empty");
      const notice = document.querySelector("#notice");
      const updated = document.querySelector(".updated");
      const status = document.querySelector("#status");
      let reviews = [];
      let selected = "전체";

      function koreanDate(value) {
        return new Intl.DateTimeFormat("ko-KR", { dateStyle: "medium", timeStyle: "short", timeZone: "Asia/Seoul" }).format(new Date(value));
      }

      function reviewCard(review) {
        const article = document.createElement("article");
        article.className = "card";
        const content = document.createElement("div");
        const tag = document.createElement("span");
        tag.className = "tag";
        tag.textContent = "리뷰";
        const title = document.createElement("h3");
        title.textContent = review.apartment;
        const body = document.createElement("p");
        body.className = "review";
        body.textContent = review.content || "내용이 없는 리뷰입니다.";
        const author = document.createElement("p");
        author.className = "meta";
        author.textContent = review.author || "작성자 미상";
        const time = document.createElement("time");
        time.className = "time";
        time.dateTime = review.date;
        time.textContent = koreanDate(review.date);
        content.append(tag, title, body, author);
        article.append(content, time);
        return article;
      }

      function render() {
        const shown = selected === "전체" ? reviews : reviews.filter(review => review.apartment === selected);
        feed.replaceChildren(...shown.map(reviewCard));
        empty.style.display = shown.length ? "none" : "block";
      }

      function renderFilters() {
        const filters = ["전체", ...new Set(reviews.map(({ apartment }) => apartment))];
        filterRoot.replaceChildren();
        filters.forEach(name => {
        const button = document.createElement("button");
        button.className = `filter${name === selected ? " active" : ""}`;
        button.textContent = name;
        button.addEventListener("click", () => {
          selected = name;
          document.querySelectorAll(".filter").forEach(item => item.classList.toggle("active", item.textContent === name));
          render();
        });
        filterRoot.append(button);
        });
      }

      async function loadReviews() {
        try {
          const response = await fetch(FEED_URL);
          if (!response.ok) throw new Error(`피드 응답: ${response.status}`);
          const state = await response.json();
          reviews = Object.values(state.apartments || {}).flatMap(apartment =>
            (apartment.reviews || []).map(review => ({
              ...review,
              apartment: apartment.aptName || "알 수 없는 단지",
              author: review.name
            }))
          ).sort((first, second) => new Date(second.date) - new Date(first.date));
          updated.textContent = state.updated_at ? `마지막 수집: ${koreanDate(state.updated_at)}` : "아직 수집된 리뷰가 없습니다.";
          status.innerHTML = "<i></i> 최신 데이터";
          notice.style.display = "none";
          renderFilters();
          render();
        } catch (error) {
          console.error(error);
          status.textContent = "데이터를 불러올 수 없음";
          notice.textContent = "현재 최신 리뷰를 불러올 수 없습니다. 잠시 후 다시 시도해 주세요.";
        }
      }

      loadReviews();
    </script>
  </body>
</html>
